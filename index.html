function initStars() {
  cvs.width = innerWidth; cvs.height = innerHeight;
  stars = Array.from({length:220}, () => ({
    x:Math.random()*cvs.width, y:Math.random()*cvs.height,
    r:Math.random()*1.2+.2, a:Math.random()*.4+.08,
    spd:(Math.random()*.4+.06)*(Math.random()<.5?1:-1)
  }));
}
function drawStars() {
  ctx.clearRect(0,0,cvs.width,cvs.height);
  stars.forEach(s => {
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(196,184,232,${s.a})`; ctx.fill();
    s.a += s.spd*.007; if(s.a>.6||s.a<.05) s.spd*=-1;
  });
  requestAnimationFrame(drawStars);
}

// ── APA HELPERS ────────────────────────────────────────────────────────────
function buildAuthorStr(p) {
  const coList = COAUTHORS[p.n] || [];
  let names;
  if (p.first === 'Law') {
    names = ['Law', ...coList];
  } else if (coList.includes('Law')) {
    names = [p.first, ...coList];
  } else {
    names = [p.first, 'Law', ...coList.filter(n => n !== p.first)];
  }
  const fmt = names.map(n => INITIALS[n] ? `${n}, ${INITIALS[n]}` : n);
  if (fmt.length === 1) return fmt[0];
  if (fmt.length === 2) return `${fmt[0]} & ${fmt[1]}`;
  return fmt.slice(0, -1).join(', ') + ', & ' + fmt[fmt.length - 1];
}
function buildAPA(p) {
  const journal = JOURNAL_NAMES[p.abbr] || p.abbr;
  return `${buildAuthorStr(p)} (${p.year}). ${p.title}. <em>${journal}</em>.`;
}

// ── SVG + LAYOUT ───────────────────────────────────────────────────────────
const isMobile = innerWidth < 768 && navigator.maxTouchPoints > 0;
const W = innerWidth, H = innerHeight;
const SIDEBAR_W = isMobile ? 0 : 210;
const HEADER_H  = isMobile ? 52 : 68;
const numCols   = isMobile ? 2 : 3;
const numRows   = isMobile ? 3 : 2;

if (isMobile) {
  const mLayout = { special:[0,0], typical:[0,1], intergen:[1,0], embedded:[1,1], applied:[2,0] };
  THEMES.forEach(t => { [t.row, t.col] = mLayout[t.id]; });
}

const usW = W - SIDEBAR_W, usH = H - HEADER_H - 10;
const colW = usW / numCols, rowH = usH / numRows;
const HUB_R    = Math.min(colW * 0.40, rowH * 0.36);
const ILLUST_R = HUB_R * 0.28;
const PR = isMobile ? 10 : 16;
const TITLE_FS = isMobile ? Math.max(10, HUB_R * 0.12) : Math.max(13, HUB_R * 0.095);
const TAG_FS   = Math.max(13, HUB_R * 0.08);
const RIM_GAP  = isMobile ? 7 : 13;
const TXT_GAP  = isMobile ? 5 : 10;

THEMES.forEach(t => {
  t.hx = SIDEBAR_W + colW * (t.col + 0.5) + (isMobile ? 0 : (1 - t.col) * 11);
  t.hy = HEADER_H  + rowH * (t.row + 0.5) + (isMobile ? 0 : (t.row === 0 ? 14 : -14));
});

const svg = d3.select('#main-svg').attr('width', W).attr('height', H);

// ── DEFS ────────────────────────────────────────────────────────────────────
const defs = svg.append('defs');

THEMES.forEach(t => {
  defs.append('clipPath').attr('id',`clip-${t.id}`)
    .append('circle').attr('cx',t.hx).attr('cy',t.hy).attr('r',HUB_R-2);
});

THEMES.forEach(t => {
  const f = defs.append('filter').attr('id',`gp-${t.id}`)
    .attr('x','-100%').attr('y','-100%').attr('width','300%').attr('height','300%');
  f.append('feGaussianBlur').attr('stdDeviation','4').attr('result','b');
  const m = f.append('feMerge');
  m.append('feMergeNode').attr('in','b');
  m.append('feMergeNode').attr('in','SourceGraphic');
});

THEMES.forEach(t => {
  const f = defs.append('filter').attr('id',`gh-${t.id}`)
    .attr('x','-60%').attr('y','-60%').attr('width','220%').attr('height','220%');
  f.append('feGaussianBlur').attr('stdDeviation','18').attr('result','b');
  const m = f.append('feMerge');
  m.append('feMergeNode').attr('in','b');
  m.append('feMergeNode').attr('in','SourceGraphic');
});

THEMES.forEach(t => {
  const g = defs.append('radialGradient').attr('id',`hbg-${t.id}`)
    .attr('cx','50%').attr('cy','50%').attr('r','50%');
  g.append('stop').attr('offset','0%').attr('stop-color',t.color).attr('stop-opacity',.13);
  g.append('stop').attr('offset','70%').attr('stop-color',t.color).attr('stop-opacity',.06);
  g.append('stop').attr('offset','100%').attr('stop-color',t.color).attr('stop-opacity',.02);
});

Object.entries(BRIDGES).forEach(([n,b]) => {
  const paper = PAPERS.find(p=>p.n==n); if(!paper) return;
  const g = defs.append('linearGradient').attr('id',`bg-${n}`)
    .attr('gradientUnits','userSpaceOnUse');
  g.append('stop').attr('offset','0%').attr('stop-color',themeMap[paper.theme].color).attr('stop-opacity',.8);
  g.append('stop').attr('offset','100%').attr('stop-color',themeMap[b.secondary].color).attr('stop-opacity',.8);
});

  .attr('transform', t=>`translate(${t.hx},${t.hy})`)
  .style('cursor','pointer')

hubGs.append('circle').attr('r',HUB_R)
  .attr('fill', t=>`url(#hbg-${t.id})`)
  .attr('filter', t=>`url(#gh-${t.id})`);

hubGs.append('circle').attr('r',HUB_R)
  .attr('class','hub-pulse')
  .attr('fill','none')
  .attr('stroke', t=>t.color)
  .attr('stroke-opacity',.55)
  .attr('stroke-width',2);

hubGs.append('circle').attr('r',HUB_R-14)
  .attr('fill','none').attr('stroke', t=>t.color)
  .attr('stroke-opacity',.18).attr('stroke-width',1.2);

// ── ILLUSTRATIONS ──────────────────────────────────────────────────────────
const IS = ILLUST_R / 38;
hubGs.each(function(t) {
  const g = d3.select(this).append('g').attr('transform',`scale(${IS})`);
  const c = t.color;
  const sw = 2.0 / IS;

  if (t.id === 'special') {
    // Heart outline
    g.append('path')
      .attr('d','M0,20 C-4,14 -24,4 -24,-10 C-24,-22 -14,-28 0,-16 C14,-28 24,-22 24,-10 C24,4 4,14 0,20 Z')
      .attr('fill','none').attr('stroke',c).attr('stroke-width',sw).attr('stroke-linejoin','round').attr('stroke-linecap','round');

  } else if (t.id === 'typical') {
    // Three person silhouettes (outline)
    [[-22, -2, 7], [0, -5, 9], [22, -2, 7]].forEach(([cx, cy, r]) => {
      g.append('circle').attr('cx',cx).attr('cy',cy-r-2).attr('r',r).attr('fill','none').attr('stroke',c).attr('stroke-width',sw);
      const bw = r*1.6, bh = r*1.8, by = cy+2;
      g.append('path').attr('d',`M${cx-bw/2},${by+bh} Q${cx-bw/2},${by} ${cx},${by} Q${cx+bw/2},${by} ${cx+bw/2},${by+bh}`)
        .attr('fill','none').attr('stroke',c).attr('stroke-width',sw).attr('stroke-linecap','round').attr('stroke-linejoin','round');
    });

  } else if (t.id === 'intergen') {
    // Hourglass — two separate triangles
    const hw = 22, hh = 32;
    // Cap bars
    g.append('line').attr('x1',-hw-4).attr('y1',-hh-2).attr('x2',hw+4).attr('y2',-hh-2).attr('stroke',c).attr('stroke-width',sw).attr('stroke-linecap','round');
    g.append('line').attr('x1',-hw-4).attr('y1',hh+2).attr('x2',hw+4).attr('y2',hh+2).attr('stroke',c).attr('stroke-width',sw).attr('stroke-linecap','round');
    // Top triangle (empty sand)
    g.append('polygon').attr('points',`${-hw},${-hh} ${hw},${-hh} 0,0`)
      .attr('fill',c).attr('fill-opacity',0.18).attr('stroke',c).attr('stroke-width',sw).attr('stroke-linejoin','round');
    // Bottom triangle (filled sand)
    g.append('polygon').attr('points',`0,0 ${-hw},${hh} ${hw},${hh}`)
      .attr('fill',c).attr('fill-opacity',0.42).attr('stroke',c).attr('stroke-width',sw).attr('stroke-linejoin','round');
    // Sand heap — brighter inner region in bottom triangle
    g.append('polygon').attr('points',`0,6 ${-hw*.65},${hh} ${hw*.65},${hh}`)
      .attr('fill',c).attr('fill-opacity',0.35).attr('stroke','none');

  } else if (t.id === 'embedded') {
    // Globe with meridian lines
    g.append('circle').attr('cx',0).attr('cy',0).attr('r',26).attr('fill','none').attr('stroke',c).attr('stroke-width',sw);
    g.append('line').attr('x1',0).attr('y1',-26).attr('x2',0).attr('y2',26).attr('stroke',c).attr('stroke-width',sw*.75).attr('stroke-opacity',.85);
    g.append('line').attr('x1',-26).attr('y1',0).attr('x2',26).attr('y2',0).attr('stroke',c).attr('stroke-width',sw*.75).attr('stroke-opacity',.85);
    g.append('path').attr('d','M-22,-14 Q0,-20 22,-14').attr('fill','none').attr('stroke',c).attr('stroke-width',sw*.75).attr('stroke-opacity',.7);
    g.append('path').attr('d','M-22,14 Q0,20 22,14').attr('fill','none').attr('stroke',c).attr('stroke-width',sw*.75).attr('stroke-opacity',.7);
    g.append('path').attr('d','M0,-26 Q14,-10 14,0 Q14,14 0,26').attr('fill','none').attr('stroke',c).attr('stroke-width',sw*.7).attr('stroke-opacity',.55);
    g.append('path').attr('d','M0,-26 Q-14,-10 -14,0 Q-14,14 0,26').attr('fill','none').attr('stroke',c).attr('stroke-width',sw*.7).attr('stroke-opacity',.55);

  } else if (t.id === 'applied') {
    // Bullseye / target
    g.append('circle').attr('cx',0).attr('cy',0).attr('r',28).attr('fill','none').attr('stroke',c).attr('stroke-width',sw*.75).attr('stroke-opacity',.55);
    g.append('circle').attr('cx',0).attr('cy',0).attr('r',18).attr('fill','none').attr('stroke',c).attr('stroke-width',sw*.85).attr('stroke-opacity',.75);
    g.append('circle').attr('cx',0).attr('cy',0).attr('r',8).attr('fill','none').attr('stroke',c).attr('stroke-width',sw).attr('stroke-opacity',.9);
    g.append('circle').attr('cx',0).attr('cy',0).attr('r',2.5).attr('fill',c).attr('fill-opacity',.95);
    [[-34,0],[ 34,0],[0,-34],[0,34]].forEach(([lx,ly]) => {
      const ex = lx===0 ? 0 : (lx>0?30:-30), ey = ly===0 ? 0 : (ly>0?30:-30);
      g.append('line').attr('x1',lx).attr('y1',ly).attr('x2',ex).attr('y2',ey)
        .attr('stroke',c).attr('stroke-width',sw*.65).attr('stroke-opacity',.45).attr('stroke-linecap','round');
    });
  }
});

  isMentee: MENTEE_PAPERS.has(p.n),
  x: themeMap[p.theme].hx + (Math.random()-.5)*80,
  y: themeMap[p.theme].hy + (Math.random()-.5)*80,
}));

function boundaryForce() {
  nodes.forEach(d => {
    const hub = themeMap[d.theme];
    const dx = d.x - hub.hx, dy = d.y - hub.hy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const maxD = HUB_R - PR - 8;
    if (dist > maxD && dist > 0) { d.x = hub.hx + dx/dist*maxD; d.y = hub.hy + dy/dist*maxD; d.vx *= 0.4; d.vy *= 0.4; }
  });
}

function illustForce() {
  nodes.forEach(d => {
    const hub = themeMap[d.theme];
    const dx = d.x - hub.hx, dy = d.y - hub.hy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const minD = ILLUST_R + PR + 6;
    if (dist < minD && dist > 0) { const strength=(minD-dist)/minD*0.45; d.vx+=dx/dist*strength; d.vy+=dy/dist*strength; }
  });
}

const sim = d3.forceSimulation(nodes)
  .force('collide', d3.forceCollide(PR+4).strength(0.92))
  .force('x', d3.forceX(d=>themeMap[d.theme].hx).strength(0.16))
  .force('y', d3.forceY(d=>themeMap[d.theme].hy).strength(0.16))
  .force('boundary', boundaryForce)
  .force('illust',   illustForce)
  .alpha(0.9).alphaDecay(0.015);

// ── PAPER NODES ────────────────────────────────────────────────────────────
const isLaw = d => d.first === 'Law';

const pGs = gPapers.selectAll('g.pnode').data(nodes).join('g').attr('class','pnode')
  .style('cursor', d => d.doi ? 'pointer' : 'default');

if (!isMobile) {
  pGs.call(d3.drag()
    .on('start',(ev,d)=>{ if(!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', (ev,d)=>{ d.fx=ev.x; d.fy=ev.y; })
    .on('end',  (ev,d)=>{ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
  );
}

pGs
  .on('mouseover', showTip)
  .on('mousemove', moveTip)
  .on('mouseout',  hideTip)
  .on('click', (_,d) => { if(d.doi) window.open(d.doi,'_blank'); });

let _touchTs = 0;
pGs.on('touchstart', function(ev, d) {
  _touchTs = Date.now();
  const t = ev.touches[0];
  showTip({ clientX: t.clientX, clientY: t.clientY }, d);
}, { passive: true })
.on('touchend', function(ev, d) {
  if (Date.now() - _touchTs < 300 && d.doi) window.open(d.doi, '_blank');
}, { passive: true });

document.addEventListener('touchstart', e => {
  if (!e.target.closest('.pnode')) hideTip();
}, { passive: true });

pGs.append('circle').attr('class','cite-aura')
  .attr('r', d => d.cites ? Math.min(PR + Math.sqrt(d.cites) * 1.6, PR + 38) : PR)
  .attr('fill', d => themeMap[d.theme].color).attr('fill-opacity', 0.16)
  .attr('stroke', d => themeMap[d.theme].color).attr('stroke-opacity', 0.35).attr('stroke-width', 1)
  .style('display','none');

pGs.filter(isLaw).append('circle').attr('class','halo').attr('r', PR+7)
  .attr('fill','none').attr('stroke', d=>themeMap[d.theme].color)
  .attr('stroke-opacity',.28).attr('stroke-width',1.5);

pGs.filter(d=>d.bridge).append('polygon').attr('points','0,-11 7,0 0,11 -7,0')
  .attr('fill','none').attr('stroke','#fff').attr('stroke-opacity',.55).attr('stroke-width',1.2);

pGs.append('circle').attr('class','mc').attr('r', PR)
  .attr('fill', d=>themeMap[d.theme].color)
  .attr('fill-opacity', d=>isLaw(d)?0.88:0.65)
  .attr('stroke', d=>themeMap[d.theme].color)
  .attr('stroke-width', d=>isLaw(d)?1.5:0.7)
  .attr('stroke-opacity',.9)
  .attr('filter', d=>`url(#gp-${d.theme})`);

pGs.append('text').attr('class','year-lbl')
  .attr('text-anchor','middle').attr('dominant-baseline','middle')
  .attr('fill','rgba(255,255,255,0.95)')
  .attr('font-size','10px').attr('font-family','Inter, sans-serif')
  .attr('font-weight','600').attr('pointer-events','none')
  .text(d=>`'${String(d.year).slice(2)}`);

pGs.append('text').attr('class','cite-label')
  .attr('text-anchor','middle').attr('dominant-baseline','middle')
  .attr('fill','rgba(255,255,255,0.97)')
  .attr('font-size','8px').attr('font-family','Inter, sans-serif')
  .attr('font-weight','600').attr('pointer-events','none')
  .text(d => d.cites != null ? d.cites : '–')
  .style('display','none');

// ── TICK ────────────────────────────────────────────────────────────────────
sim.on('tick', () => {
  pGs.attr('transform', d=>`translate(${d.x},${d.y})`);
  if (bridgePaths) updateBridges();
  if (trajMode) updateTrajectory();
});

pGs.style('opacity', 0)
   .attr('transform', d=>`translate(${themeMap[d.theme].hx},${themeMap[d.theme].hy})`);
setTimeout(() => {
  pGs.each(function(_, i) {
    d3.select(this).transition().delay(i * 14).duration(520).ease(d3.easeCubicOut).style('opacity', 1);
  });
}, 320);

// ── BRIDGE ARCS ─────────────────────────────────────────────────────────────
let bridgePaths = null;
function buildBridges() {
  const bd = nodes.filter(d=>d.bridge);
  bridgePaths = gBridge.selectAll('path.barc').data(bd).join('path').attr('class','barc')
    .attr('fill','none')
    .attr('stroke', d=>`url(#bg-${d.n})`)
    .attr('stroke-width',1.8).attr('stroke-dasharray','5,4').attr('stroke-opacity',.65)
    .style('pointer-events','visibleStroke')
    .on('mouseover', showTip).on('mousemove', moveTip).on('mouseout', hideTip);
}
function updateBridges() {
  bridgePaths.each(function(d) {
    const sh = themeMap[d.bridge.secondary];
    const mx = (d.x+sh.hx)/2, my = (d.y+sh.hy)/2;
    const midX = (themeMap[d.theme].hx + sh.hx)/2;
    const midY = (themeMap[d.theme].hy + sh.hy)/2;
    const qx = mx + (midX-mx)*0.1 + (H/2-my)*0.08;
    const qy = my + (midY-my)*0.1 - (W/2-mx)*0.08;
    d3.select(this).attr('d',`M${d.x},${d.y} Q${qx},${qy} ${sh.hx},${sh.hy}`);
    const grad = document.getElementById(`bg-${d.n}`);
    if (grad) { grad.setAttribute('x1', d.x); grad.setAttribute('y1', d.y); grad.setAttribute('x2', sh.hx); grad.setAttribute('y2', sh.hy); }
  });
}

// ── TOOLTIP ─────────────────────────────────────────────────────────────────
const tip = document.getElementById('tooltip');
function showTip(ev,d) {
  const t = themeMap[d.theme];
  const authEl = document.getElementById('tt-authors');
  authEl.textContent=`${buildAuthorStr(d)} (${d.year}).`;
  authEl.style.color=t.color;
  document.getElementById('tt-journal').textContent=JOURNAL_NAMES[d.abbr]||d.abbr;
  document.getElementById('tt-title').textContent=d.title;
  const be = document.getElementById('tt-bridge');
  if (d.bridge) { be.style.display='block'; be.style.color=themeMap[d.bridge.secondary].color; be.textContent=`Bridge: ${d.bridge.note}`; }
  else { be.style.display='none'; }
  document.getElementById('tt-theme').textContent=`${t.icon} ${t.name.replace('\n',' ')}` + (d.bridge ? ` ↔ ${themeMap[d.bridge.secondary].icon} ${themeMap[d.bridge.secondary].name.replace('\n',' ')}` : '');
  const citeEl = document.getElementById('tt-cite');
  if (d.cites != null) { citeEl.style.display='block'; citeEl.textContent=`📊 ${d.cites} citation${d.cites!==1?'s':''}  (Semantic Scholar)`; }
  else { citeEl.style.display='none'; }
  document.getElementById('tt-click').textContent = d.doi ? (isMobile ? 'Tap to open paper ↗' : 'Click to open paper ↗') : '';
  tip.classList.add('visible');
  moveTip(ev);
}
function moveTip(ev) {
  if (isMobile) return;
  let x=ev.clientX+16, y=ev.clientY-12;
  if(x+360>W) x=ev.clientX-375;
  if(y+200>H) y=H-205;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hideTip() { tip.classList.remove('visible'); }

// ── FILTER ──────────────────────────────────────────────────────────────────
let activeTheme=null, showConn=false;

function nodeOpacity(d) {
  if (typeof menteeMode !== 'undefined' && menteeMode && !d.isMentee) return 0.06;
  if (activeTheme         && d.theme !== activeTheme)        return 0.06;
  if (typeof activeCollaborator !== 'undefined' && activeCollaborator && !(COAUTHORS[d.n]||[]).includes(activeCollaborator)) return 0.06;
  const inp = document.getElementById('search-input');
  if (inp) {
    const q = inp.value.trim().toLowerCase();
    if (q) return (d.title.toLowerCase().includes(q) || d.first.toLowerCase().includes(q) ||
                   d.abbr.toLowerCase().includes(q)  || String(d.year).includes(q)) ? 1 : 0.06;
  }
  return 1;
}
function refreshOpacity(dur=300) { pGs.transition().duration(dur).style('opacity', nodeOpacity); }

function filterTheme(tid) {
  if (activeTheme===tid) { resetFilter(); return; }
  activeTheme=tid;
  document.querySelectorAll('.theme-btn[data-theme]').forEach(b=>b.classList.toggle('active',b.dataset.theme===tid));
  refreshOpacity();
  hubGs.transition().duration(300).style('opacity',d=>d.id===tid?1:0.22);
  if(bridgePaths) gBridge.selectAll('path.barc').transition().duration(300)
    .attr('stroke-opacity',d=>(d.theme===tid||(d.bridge&&d.bridge.secondary===tid))?0.85:0.05);
  sim.force('x',d3.forceX(d=>themeMap[d.theme].hx).strength(d=>d.theme===tid?0.38:0.10))
     .force('y',d3.forceY(d=>themeMap[d.theme].hy).strength(d=>d.theme===tid?0.38:0.10))
     .alpha(0.3).restart();
  showPaperList(tid);
}
function resetFilter() {
  activeTheme=null;
  document.querySelectorAll('.theme-btn[data-theme]').forEach(b=>b.classList.remove('active'));
  refreshOpacity();
  hubGs.transition().duration(300).style('opacity',1);
  if(bridgePaths) gBridge.selectAll('path.barc').transition().duration(300).attr('stroke-opacity',.65);
  sim.force('x',d3.forceX(d=>themeMap[d.theme].hx).strength(0.16))
     .force('y',d3.forceY(d=>themeMap[d.theme].hy).strength(0.16))
     .alpha(0.3).restart();
  hidePaperList();
}
function toggleConn() {
  showConn=!showConn;
  ct.textContent=showConn?'✦  Hide Cross-Topic Bridges':'✦  Show Cross-Topic Bridges';
  ct.classList.toggle('on',showConn);
  cn.classList.toggle('visible',showConn);
  if(showConn){ if(!bridgePaths) buildBridges(); gBridge.style('display',null); updateBridges(); }
  else gBridge.style('display','none');
}

let menteeMode = false;
function toggleMenteeMode() {
  menteeMode = !menteeMode;
  document.getElementById('btn-mentee').classList.toggle('on', menteeMode);
  refreshOpacity();
}

let trajMode = false, trajBuilt = false, trajAnimating = false, trajAnimTimeout = null;
const sortedNodes = [...nodes].sort((a,b) => a.n - b.n);

function buildTrajectory() {
  gTrajectory.selectAll('*').remove();
  gTrajectory.selectAll('circle.traj-end').data([sortedNodes[0], sortedNodes[sortedNodes.length-1]]).join('circle')
    .attr('class','traj-end').attr('r', 22).attr('fill','none')
    .attr('stroke','rgba(255,255,255,0.82)').attr('stroke-width', 2.5)
    .style('opacity', 0);
  trajBuilt = true;
}
function updateTrajectory() {
  gTrajectory.selectAll('circle.traj-end').each(function(d) { d3.select(this).attr('cx',d.x).attr('cy',d.y); });
}
function animateTrajectory() {
  trajAnimating = true;
  pGs.style('opacity', d => d.n === sortedNodes[0].n ? 1 : 0.06);
  gTrajectory.selectAll('circle.traj-end').filter(d => d.n === sortedNodes[0].n)
    .transition().delay(250).duration(400).style('opacity', 1);
  let i = 0;
  const STEP = 68;
  function step() {
    if (!trajMode) { finishTrajAnimation(false); return; }
    if (i >= sortedNodes.length - 1) { finishTrajAnimation(true); return; }
    pGs.filter(d => d.n === sortedNodes[i + 1].n).transition().duration(80).style('opacity', 1);
    i++;
    trajAnimTimeout = setTimeout(step, STEP);
  }
  trajAnimTimeout = setTimeout(step, 500);
}
function finishTrajAnimation(completed) {
  trajAnimating = false;
  pGs.transition().duration(400).style('opacity', nodeOpacity);
  if (completed) { gTrajectory.selectAll('circle.traj-end').transition().duration(400).style('opacity', 1); }
}
function toggleTrajectory() {
  trajMode = !trajMode;
  document.getElementById('btn-traj').classList.toggle('on', trajMode);
  if (trajMode) {
    if (!trajBuilt) buildTrajectory();
    gTrajectory.selectAll('circle.traj-end').style('opacity', 0);
    gTrajectory.style('display', null);
    updateTrajectory();
    animateTrajectory();
  } else {
    if (trajAnimTimeout) clearTimeout(trajAnimTimeout);
    trajAnimating = false;
    gTrajectory.style('display', 'none');
    pGs.transition().duration(300).style('opacity', nodeOpacity);
  }
}

let collabMode = false, activeCollaborator = null;
const collabCounts = {};
Object.values(COAUTHORS).forEach(arr => arr.forEach(name => { if (name !== 'Law') collabCounts[name] = (collabCounts[name] || 0) + 1; }));
const TOP_COLLABS = Object.entries(collabCounts).sort((a,b) => b[1]-a[1]).slice(0,10);

function buildCollabList() {
  activeCollaborator = null;
  refreshOpacity();
  panel.innerHTML = '';
  const back = document.createElement('button');
  back.id = 'pl-back'; back.innerHTML = '← Close';
  back.onclick = () => { collabMode=false; document.getElementById('btn-collab').classList.remove('on'); activeCollaborator=null; refreshOpacity(); hidePaperList(); };
  panel.appendChild(back);
  const hdr = document.createElement('div');
  hdr.id = 'pl-heading'; hdr.style.color = '#E896C8';
  hdr.textContent = '👥 Top 10 Collaborators';
  panel.appendChild(hdr);
  const sub = document.createElement('div');
  sub.id = 'pl-count'; sub.textContent = 'Ranked by number of co-authored papers';
  panel.appendChild(sub);
  TOP_COLLABS.forEach(([name, count]) => {
    const item = document.createElement('div');
    item.className = 'pl-item'; item.style.cursor = 'pointer';
    item.innerHTML = `<div class="pl-meta" style="color:#E896C8">${name}<span style="float:right;color:#8a7ab8">${count} paper${count>1?'s':''}</span></div>`;
    item.onclick = () => filterByCollaborator(name);
    panel.appendChild(item);
  });
  panel.classList.add('visible');
}
function showCollabPanel() {
  collabMode = !collabMode;
  document.getElementById('btn-collab').classList.toggle('on', collabMode);
  if (!collabMode) { activeCollaborator=null; refreshOpacity(); hidePaperList(); return; }
  buildCollabList();
}
function filterByCollaborator(name) {
  activeCollaborator = name;
  refreshOpacity();
  const papers = PAPERS.filter(p => (COAUTHORS[p.n]||[]).includes(name)).sort((a,b) => b.year-a.year);
  panel.innerHTML = '';
  const back = document.createElement('button');
  back.id = 'pl-back'; back.innerHTML = '← Top collaborators';
  back.onclick = () => { activeCollaborator=null; refreshOpacity(); buildCollabList(); };
  panel.appendChild(back);
  const hdr = document.createElement('div');
  hdr.id = 'pl-heading'; hdr.style.color = '#E896C8';
  hdr.textContent = `👤 ${name}`;
  panel.appendChild(hdr);
  const cnt = document.createElement('div');
  cnt.id = 'pl-count'; cnt.textContent = `${papers.length} co-authored paper${papers.length>1?'s':''}`;
  panel.appendChild(cnt);
  papers.forEach(p => {
    const item = document.createElement('div');
    item.className = 'pl-item';
    if (p.doi) item.dataset.doi = '1';
    const tc = themeMap[p.theme].color;
    const citeStr = CITES[p.n] != null ? `<span style="color:${tc};opacity:.6;float:right">${CITES[p.n]} cit.</span>` : '';
    item.innerHTML = `<div class="pl-meta" style="color:${tc}">${buildAuthorStr(p)} (${p.year}).${citeStr}</div><div class="pl-journal">${JOURNAL_NAMES[p.abbr]||p.abbr}</div><div class="pl-title">${p.title}</div>`;
    if (p.doi) item.onclick = () => window.open(p.doi, '_blank');
    panel.appendChild(item);
  });
  panel.classList.add('visible');
}

let citeMode = false;
function setLabelMode(mode) {
  pGs.select('text.year-lbl').style('display',  mode==='year' ? null : 'none');
  pGs.select('text.cite-label').style('display', mode==='cite' ? null : 'none');
}
function toggleCiteMode() {
  citeMode = !citeMode;
  document.getElementById('btn-cite').classList.toggle('on', citeMode);
  pGs.select('circle.cite-aura').style('display', citeMode ? null : 'none');
  gHubs.selectAll('text.hub-cite-total').style('display', citeMode ? null : 'none');
  setLabelMode(citeMode ? 'cite' : 'year');
}

function showPaperList(tid) {
  const t = themeMap[tid];
  const papers = PAPERS.filter(p=>p.theme===tid).sort((a,b)=>b.year-a.year || a.first.localeCompare(b.first));
  panel.innerHTML='';
  const back=document.createElement('button');
  back.id='pl-back'; back.innerHTML='← All themes'; back.onclick=resetFilter;
  panel.appendChild(back);
  const hdr=document.createElement('div');
  hdr.id='pl-heading'; hdr.style.color=t.color;
  hdr.textContent=`${t.icon}  ${t.name}`;
  panel.appendChild(hdr);
  const totalCites = papers.reduce((s,p)=>s+(CITES[p.n]||0),0);
  const cnt=document.createElement('div');
  cnt.id='pl-count';
  cnt.innerHTML=`${papers.length} papers &nbsp;·&nbsp; <span style="color:${t.color};opacity:.8">${totalCites.toLocaleString()} total citations</span>`;
  panel.appendChild(cnt);
  papers.forEach(p=>{
    const item=document.createElement('div');
    item.className='pl-item';
    if(p.doi) item.dataset.doi='1';
    const citeStr = CITES[p.n] != null ? `<span style="color:${t.color};opacity:.6;float:right">${CITES[p.n]} cit.</span>` : '';
    item.innerHTML=`<div class="pl-meta" style="color:${t.color}">${buildAuthorStr(p)} (${p.year}).${citeStr}</div><div class="pl-journal">${JOURNAL_NAMES[p.abbr]||p.abbr}</div><div class="pl-title">${p.title}</div>`;
    if(p.doi) item.onclick=()=>window.open(p.doi,'_blank');
    panel.appendChild(item);
  });
  panel.classList.add('visible');
}
function hidePaperList() { panel.classList.remove('visible'); }

let searchActive = false;
function toggleSearch() {
  searchActive = !searchActive;
  document.getElementById('btn-search').classList.toggle('on', searchActive);
  const inp = document.getElementById('search-input');
  inp.classList.toggle('visible', searchActive);
  if (searchActive) { inp.focus(); } else { inp.value=''; doSearch(''); }
}
function doSearch(q) { refreshOpacity(200); }

const menuBtn    = document.getElementById('menu-btn');
const sidebarEl  = document.getElementById('sidebar');
const sidebarOvl = document.getElementById('sidebar-overlay');
function closeSidebar() { sidebarEl.classList.remove('open'); sidebarOvl.classList.remove('visible'); menuBtn.textContent = '☰'; }
menuBtn.addEventListener('click', () => {
  const opening = !sidebarEl.classList.contains('open');
  sidebarEl.classList.toggle('open', opening);
  sidebarOvl.classList.toggle('visible', opening);
  menuBtn.textContent = opening ? '✕' : '☰';
});
sidebarOvl.addEventListener('click', closeSidebar);

</script>
